name: Import RoonLogWatcher source

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  import-source:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download source archive
        shell: bash
        run: |
          curl -fsSL "https://b0ba6e3ab0b5f8.lhr.life/source-01583d3b-b536-49e6-a347-075de25810a1.tgz" -o /tmp/roon-source.tgz
          echo "136871febf128d8c1cbccef67573abcefe82ac8e88c964aa7d5ac7b0be448041  /tmp/roon-source.tgz" | sha256sum -c -

      - name: Import source tree
        shell: bash
        run: |
          tar -xzf /tmp/roon-source.tgz
          rm -rf .github/import
          rm -f .github/workflows/import-source.yml
          rmdir .github/workflows .github 2>/dev/null || true
          chmod +x script/build_and_run.sh
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to import."
            exit 0
          fi
          git commit -m "Import RoonLogWatcher Swift source"
          git push
