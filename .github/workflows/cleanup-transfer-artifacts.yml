name: Clean transfer artifacts

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Remove transfer and AppleDouble artifacts
        shell: bash
        run: |
          git rm -f --ignore-unmatch TRANSFER.md
          find . -path ./.git -prune -o -name '._*' -type f -print -delete
          if ! grep -qxF 'TRANSFER.md' .gitignore; then
            {
              printf '\n# Local transfer notes\n'
              printf 'TRANSFER.md\n'
              printf '\n# macOS AppleDouble resource fork metadata\n'
              printf '._*\n'
              printf '**/._*\n'
            } >> .gitignore
          fi
          rm -f .github/workflows/cleanup-transfer-artifacts.yml
          rmdir .github/workflows .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No cleanup changes needed."
            exit 0
          fi
          git commit -m "Remove transfer artifacts and AppleDouble files"
          git push
