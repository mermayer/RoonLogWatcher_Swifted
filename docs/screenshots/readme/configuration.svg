<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Roon Log Watcher Configuration</title>
  <desc id="desc">Configuration panel preview with language, dashboard, polling, history, health and source settings.</desc>
  <defs>
    <style>
      .bg{fill:#071013}.shade{fill:#020608;opacity:.72}.panel{fill:#101820;stroke:#2b3943;stroke-width:1}.section{fill:#0c141b;stroke:#25343e;stroke-width:1}.input{fill:#080f15;stroke:#34434d;stroke-width:1}.text{fill:#d8e2e8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.muted{fill:#8ea1ad}.label{font-size:14px;font-weight:700}.small{font-size:15px}.tiny{font-size:13px}.title{font-size:27px;font-weight:800}.green{fill:#72d66b}.line{stroke:#273842;stroke-width:1}
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <g opacity=".22">
    <rect class="section" x="20" y="30" width="210" height="560" rx="5"/>
    <rect class="section" x="260" y="70" width="500" height="340" rx="5"/>
    <rect class="section" x="790" y="68" width="190" height="540" rx="5"/>
    <g fill="#65cf70"><rect x="44" y="190" width="120" height="16" rx="4"/><rect x="44" y="250" width="90" height="12" rx="4"/><rect x="552" y="220" width="48" height="200" rx="14"/></g>
  </g>
  <rect class="shade" width="1280" height="720"/>
  <rect class="panel" x="765" y="0" width="515" height="720"/>
  <text class="text title" x="800" y="48">Configuration</text>
  <text class="muted text tiny" x="800" y="74">/Users/joemac/Library/Application Support/RoonLogWatcher/config...</text>
  <rect class="section" x="1230" y="25" width="28" height="28" rx="4"/><text class="muted text small" x="1239" y="45">x</text>
  <line class="line" x1="765" y1="96" x2="1280" y2="96"/>

  <g transform="translate(800 126)">
    <text class="text label" x="0" y="0">Language</text>
    <text class="text label" x="285" y="0">Dashboard Port</text>
    <rect class="input" x="0" y="16" width="250" height="42" rx="4"/><text class="text small" x="20" y="43">English</text>
    <rect class="input" x="285" y="16" width="195" height="42" rx="4"/><text class="text small" x="304" y="43">17666</text>

    <text class="text label" x="0" y="91">Polling Interval</text>
    <text class="text label" x="285" y="91">Max Files / Directory</text>
    <rect class="input" x="0" y="107" width="250" height="42" rx="4"/><text class="text small" x="20" y="134">1</text>
    <rect class="input" x="285" y="107" width="195" height="42" rx="4"/><text class="text small" x="304" y="134">50</text>

    <text class="text label" x="0" y="182">Recent Log Lines</text>
    <text class="text label" x="285" y="182">Retained History Lines</text>
    <rect class="input" x="0" y="198" width="250" height="42" rx="4"/><text class="text small" x="20" y="225">500</text>
    <rect class="input" x="285" y="198" width="195" height="42" rx="4"/><text class="text small" x="304" y="225">5000</text>

    <text class="text label" x="0" y="273">Max Log Line Length</text>
    <text class="text label" x="285" y="273">Alert Dedupe Seconds</text>
    <rect class="input" x="0" y="289" width="250" height="42" rx="4"/><text class="text small" x="20" y="316">2000</text>
    <rect class="input" x="285" y="289" width="195" height="42" rx="4"/><text class="text small" x="304" y="316">45</text>
  </g>

  <line class="line" x1="800" y1="478" x2="1248" y2="478"/>
  <text class="muted text label" x="800" y="512">HEALTH RULES</text>
  <g transform="translate(800 540)">
    <text class="text tiny" x="0" y="0" font-weight="700">Log stale warning (s)</text>
    <text class="text tiny" x="285" y="0" font-weight="700">Log stale critical (s)</text>
    <rect class="input" x="0" y="14" width="250" height="36" rx="4"/><text class="text tiny" x="18" y="37">180</text>
    <rect class="input" x="285" y="14" width="195" height="36" rx="4"/><text class="text tiny" x="304" y="37">600</text>

    <text class="text tiny" x="0" y="82" font-weight="700">RAAT warning disconnects</text>
    <text class="text tiny" x="285" y="82" font-weight="700">RAAT critical disconnects</text>
    <rect class="input" x="0" y="96" width="250" height="36" rx="4"/><text class="text tiny" x="18" y="119">2</text>
    <rect class="input" x="285" y="96" width="195" height="36" rx="4"/><text class="text tiny" x="304" y="119">5</text>
  </g>
</svg>
