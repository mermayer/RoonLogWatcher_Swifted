<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Roon Health Details</title>
  <desc id="desc">Health details panel preview with trend bars, weighted signals and local system status.</desc>
  <defs>
    <style>
      .bg{fill:#071013}.shade{fill:#020608;opacity:.72}.panel{fill:#101820;stroke:#2b3943;stroke-width:1}.card{fill:#151c25;stroke:#30404a;stroke-width:1}.text{fill:#d8e2e8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.muted{fill:#8ea1ad}.title{font-size:27px;font-weight:800}.label{font-size:14px;font-weight:800;letter-spacing:.6px}.small{font-size:15px}.tiny{font-size:13px}.green{fill:#72d66b}.yellow{fill:#f3c85f}.red{fill:#ef6666}.line{stroke:#273842;stroke-width:1}.blue{fill:#7fb4ff}
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <g opacity=".22">
    <rect class="card" x="20" y="30" width="220" height="570" rx="5"/>
    <rect class="card" x="265" y="70" width="495" height="340" rx="5"/>
    <rect class="card" x="788" y="68" width="190" height="540" rx="5"/>
    <g fill="#65cf70"><rect x="48" y="190" width="115" height="16" rx="4"/><rect x="560" y="220" width="46" height="200" rx="14"/></g>
  </g>
  <rect class="shade" width="1280" height="720"/>
  <rect class="panel" x="705" y="0" width="575" height="720"/>
  <text class="text title" x="740" y="48">Health Details</text>
  <text class="muted text tiny" x="740" y="74">Stable - Score 100 - Log ingestion and watched system signals look healthy.</text>
  <rect class="card" x="1230" y="25" width="28" height="28" rx="4"/><text class="muted text small" x="1239" y="45">x</text>
  <line class="line" x1="705" y1="96" x2="1280" y2="96"/>

  <text class="muted text label" x="740" y="132">HEALTH TREND</text>
  <g transform="translate(740 172)">
    <rect class="red" x="0" y="32" width="14" height="44" rx="4"/>
    <rect class="yellow" x="24" y="18" width="14" height="58" rx="4"/>
    <rect class="green" x="48" y="8" width="14" height="68" rx="4"/>
    <rect class="green" x="72" y="4" width="14" height="72" rx="4"/>
    <rect class="green" x="96" y="4" width="14" height="72" rx="4"/>
    <rect class="green" x="120" y="4" width="14" height="72" rx="4"/>
    <rect class="green" x="144" y="4" width="14" height="72" rx="4"/>
    <line class="line" x1="0" y1="86" x2="500" y2="86"/>
  </g>

  <text class="muted text label" x="740" y="292">SIGNALS</text>
  <g transform="translate(740 315)">
    <rect class="card" x="0" y="0" width="500" height="92" rx="5"/>
    <text class="text small" x="20" y="28" font-weight="800">Log volume has free space</text>
    <text class="muted text tiny" x="20" y="52">346.5 GB free on the log volume.</text>
    <text class="muted text tiny" x="20" y="74">/Users/joemac/Library/RAATServer/Logs</text>

    <rect class="card" x="0" y="108" width="500" height="92" rx="5"/>
    <text class="text small" x="20" y="136" font-weight="800">Log stream fresh</text>
    <text class="muted text tiny" x="20" y="160">Recent log lines are arriving.</text>
    <text class="muted text tiny" x="20" y="182">RoonServer/RoonServer_log.txt</text>

    <rect class="card" x="0" y="216" width="500" height="76" rx="5"/>
    <text class="text small" x="20" y="244" font-weight="800">Local Roon Server detected</text>
    <text class="muted text tiny" x="20" y="268">Roon log directory detected.</text>

  </g>

  <text class="muted text label" x="740" y="636">LOCAL SYSTEM</text>
  <rect class="card" x="740" y="654" width="500" height="44" rx="5"/>
  <text class="green text tiny" x="760" y="681">Roon Server host detected - CPU 0.0% - Memory 0 MB</text>
</svg>
