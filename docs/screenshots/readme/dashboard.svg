<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Roon Log Watcher Dashboard</title>
  <desc id="desc">Dashboard preview with runtime health, watched sources, live log stream, alerts and playback events.</desc>
  <defs>
    <style>
      .bg{fill:#071013}.panel{fill:#101820;stroke:#23313a;stroke-width:1}.panel2{fill:#0c141b;stroke:#23313a;stroke-width:1}.muted{fill:#8ea1ad}.text{fill:#d8e2e8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.small{font-size:16px}.tiny{font-size:13px}.label{font-size:12px;font-weight:700;letter-spacing:.6px}.green{fill:#72d66b}.blue{fill:#7fb4ff}.yellow{fill:#f3c85f}.red{fill:#ef6666}.line{stroke:#253640;stroke-width:1}.chip{fill:#13212a;stroke:#2a3b45;stroke-width:1}.input{fill:#081018;stroke:#263640;stroke-width:1}.button{fill:#17252e;stroke:#34454f;stroke-width:1}.log{font-family:SFMono-Regular,Consolas,monospace;font-size:13px;fill:#c8d3d9}.info{fill:#69d47b;font-family:SFMono-Regular,Consolas,monospace;font-size:12px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <rect class="panel" x="0" y="0" width="1280" height="44"/>
  <text class="text small" x="24" y="28" font-weight="700">Roon Log Watcher</text>
  <circle class="green" cx="220" cy="22" r="5"/>
  <text class="text tiny" x="234" y="27">Server: Connected</text>
  <text class="muted text tiny" x="394" y="27">Roon Server</text>
  <text class="muted text tiny" x="520" y="27">Local Port: </text>
  <text class="green text tiny" x="600" y="27">17666</text>
  <text class="muted text tiny" x="710" y="27">Uptime: </text>
  <text class="green text tiny" x="765" y="27">0h 3m 1s</text>
  <rect class="button" x="1110" y="10" width="104" height="24" rx="4"/>
  <text class="text tiny" x="1130" y="27">Export Logs</text>

  <rect class="panel" x="0" y="44" width="260" height="676"/>
  <text class="muted text label" x="20" y="72">RUNTIME HEALTH</text>
  <rect class="panel2" x="16" y="88" width="228" height="120" rx="4"/>
  <circle cx="56" cy="134" r="30" fill="#0b1d18" stroke="#51d86a" stroke-width="5"/>
  <text class="green text" x="43" y="142" font-size="20" font-weight="800">100</text>
  <text class="text small" x="96" y="120" font-weight="700">Roon Health</text>
  <text class="muted text tiny" x="96" y="142">Stable</text>
  <circle class="green" cx="28" cy="166" r="4"/>
  <text class="text tiny" x="42" y="170">Log stream fresh</text>
  <circle class="green" cx="28" cy="188" r="4"/>
  <text class="text tiny" x="42" y="192">Log sources active</text>
  <rect class="red" x="30" y="198" width="7" height="18" rx="2"/>
  <rect class="yellow" x="42" y="190" width="7" height="26" rx="2"/>
  <rect class="green" x="54" y="180" width="7" height="36" rx="2"/>
  <rect class="green" x="66" y="174" width="7" height="42" rx="2"/>
  <rect class="green" x="78" y="168" width="7" height="48" rx="2"/>
  <rect class="green" x="90" y="168" width="7" height="48" rx="2"/>
  <rect class="green" x="102" y="168" width="7" height="48" rx="2"/>

  <g transform="translate(18 232)">
    <text class="text small" x="0" y="0">Roon Core</text><text class="green text tiny" x="170" y="0">Stable</text>
    <text class="text small" x="0" y="36">RAAT Server</text><text class="green text tiny" x="160" y="36">Running</text>
    <text class="text small" x="0" y="72">Database</text><text class="green text tiny" x="168" y="72">Healthy</text>
    <text class="text small" x="0" y="108">File Watcher</text><text class="green text tiny" x="168" y="108">Watch</text>
    <text class="text small" x="0" y="144">Log Ingestion</text><text class="green text tiny" x="170" y="144">Live</text>
    <text class="text small" x="0" y="180">Disk Space</text><text class="green text tiny" x="132" y="180">346 GB free</text>
  </g>
  <line class="line" x1="0" y1="430" x2="260" y2="430"/>
  <text class="muted text label" x="20" y="458">WATCHED LOG SOURCES</text>
  <text class="text tiny" x="24" y="486">RAATServer_log.txt</text><text class="muted text tiny" x="184" y="486">Waiting</text>
  <text class="text tiny" x="24" y="512">Roon_log.txt</text><text class="muted text tiny" x="184" y="512">Waiting</text>
  <text class="green text tiny" x="24" y="538">RoonServer_log.txt</text><text class="green text tiny" x="188" y="538">Live</text>
  <line class="line" x1="0" y1="570" x2="260" y2="570"/>
  <text class="muted text label" x="20" y="598">MEMORY &amp; RESOURCES</text>
  <text class="text tiny" x="24" y="626">RSS Memory</text><rect class="green" x="122" y="617" width="92" height="7" rx="3"/>
  <text class="text tiny" x="24" y="652">Virtual Memory</text><rect class="green" x="132" y="643" width="82" height="7" rx="3"/>
  <text class="text tiny" x="24" y="678">Managed Memory</text><rect class="green" x="146" y="669" width="68" height="7" rx="3"/>

  <rect class="panel" x="260" y="44" width="720" height="676"/>
  <text class="muted text label" x="284" y="74">LIVE LOG STREAM</text>
  <rect class="button" x="284" y="94" width="34" height="28" rx="4"/><text class="text small" x="296" y="114">II</text>
  <rect class="input" x="340" y="94" width="96" height="28" rx="4"/><text class="text tiny" x="360" y="113">All</text>
  <rect class="input" x="452" y="94" width="210" height="28" rx="4"/><text class="muted text tiny" x="470" y="113">Filter logs...</text>
  <rect class="button" x="786" y="94" width="64" height="28" rx="4"/><text class="text tiny" x="806" y="113">Clear</text>
  <circle class="green" cx="945" cy="108" r="10"/><text class="muted text tiny" x="880" y="113">AUTO SCROLL</text>
  <line class="line" x1="284" y1="142" x2="950" y2="142"/>
  <text class="muted text tiny" x="286" y="164">TIME</text><text class="muted text tiny" x="386" y="164">LEVEL</text><text class="muted text tiny" x="486" y="164">SOURCE</text><text class="muted text tiny" x="650" y="164">MESSAGE</text>
  <g transform="translate(286 184)">
    <text class="log" x="0" y="0">11:54:36 AM</text><text class="info" x="100" y="0">INFO</text><text class="log" x="170" y="0">RoonServer_log</text><text class="log" x="350" y="0">Info: [stats] 428943mb Virtual, 1534mb Physical...</text>
    <text class="log" x="0" y="28">11:54:31 AM</text><text class="info" x="100" y="28">INFO</text><text class="log" x="170" y="28">RoonServer_log</text><text class="log" x="350" y="28">Info: [stats] 428938mb Virtual, 1534mb Physical...</text>
    <text class="log" x="0" y="56">11:54:26 AM</text><text class="info" x="100" y="56">INFO</text><text class="log" x="170" y="56">RoonServer_log</text><text class="log" x="350" y="56">Info: [stats] 428934mb Virtual, 1534mb Physical...</text>
    <text class="log" x="0" y="84">11:54:21 AM</text><text class="info" x="100" y="84">INFO</text><text class="log" x="170" y="84">RoonServer_log</text><text class="log" x="350" y="84">Info: library tracks loaded...</text>
    <text class="log" x="0" y="112">11:54:16 AM</text><text class="info" x="100" y="112">INFO</text><text class="log" x="170" y="112">RoonServer_log</text><text class="log" x="350" y="112">Info: [stats] 428931mb Virtual, 1534mb Physical...</text>
    <text class="log" x="0" y="140">11:54:11 AM</text><text class="info" x="100" y="140">INFO</text><text class="log" x="170" y="140">RoonServer_log</text><text class="log" x="350" y="140">Info: [stats] 428929mb Virtual, 1534mb Physical...</text>
    <text class="log" x="0" y="168">11:54:06 AM</text><text class="info" x="100" y="168">INFO</text><text class="log" x="170" y="168">RoonServer_log</text><text class="log" x="350" y="168">Info: [stats] 428925mb Virtual, 1534mb Physical...</text>
  </g>
  <line class="line" x1="284" y1="430" x2="950" y2="430"/>
  <text class="muted text tiny" x="300" y="462">15 min</text>
  <text class="muted text tiny" x="384" y="462">Log Volume</text>
  <rect class="panel2" x="284" y="480" width="666" height="160" rx="4"/>
  <line class="line" x1="312" y1="600" x2="928" y2="600"/>
  <line class="line" x1="312" y1="550" x2="928" y2="550"/>
  <g fill="#56646d">
    <rect x="332" y="594" width="8" height="6"/><rect x="348" y="593" width="8" height="7"/><rect x="364" y="595" width="8" height="5"/><rect x="790" y="590" width="8" height="10"/><rect x="806" y="588" width="8" height="12"/><rect x="822" y="586" width="8" height="14"/><rect x="838" y="584" width="8" height="16"/><rect x="854" y="581" width="8" height="19"/><rect x="870" y="580" width="8" height="20"/>
  </g>
  <text class="muted text tiny" x="314" y="626">11:40 AM</text><text class="muted text tiny" x="810" y="626">Now</text>

  <rect class="panel" x="980" y="44" width="300" height="676"/>
  <text class="muted text label" x="1010" y="74">ALERTS</text>
  <rect class="button" x="1010" y="94" width="72" height="30" rx="4"/><text class="text tiny" x="1034" y="114">All 0</text>
  <rect class="button" x="1094" y="94" width="76" height="30" rx="4"/><text class="text tiny" x="1112" y="114">Errors 0</text>
  <rect class="button" x="1182" y="94" width="82" height="30" rx="4"/><text class="text tiny" x="1196" y="114">Warnings 0</text>
  <text class="muted text tiny" x="1010" y="160">No alerts</text>
  <line class="line" x1="980" y1="320" x2="1280" y2="320"/>
  <text class="blue text tiny" x="1010" y="348">View all alerts...</text>
  <text class="muted text label" x="1010" y="392">PLAYBACK &amp; RAAT EVENTS</text>
  <text class="muted text tiny" x="1010" y="438">No playback events</text>
  <line class="line" x1="980" y1="640" x2="1280" y2="640"/>
  <text class="blue text tiny" x="1010" y="670">View all events...</text>
</svg>
